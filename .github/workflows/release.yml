name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build app and DMG
    runs-on: macos-latest
    outputs:
      version: ${{ steps.prepare.outputs.version }}
      clean_version: ${{ steps.prepare.outputs.clean_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install Swift 6.2 toolchain
        shell: bash
        run: |
          set -euo pipefail
          TOOLCHAIN_PKG="swift-6.2-RELEASE-osx.pkg"
          TOOLCHAIN_URL="https://download.swift.org/swift-6.2-release/xcode/swift-6.2-RELEASE/${TOOLCHAIN_PKG}"
          curl -fL "$TOOLCHAIN_URL" -o "$TOOLCHAIN_PKG"
          sudo installer -pkg "$TOOLCHAIN_PKG" -target /
          rm "$TOOLCHAIN_PKG"
          echo "/Library/Developer/Toolchains/swift-6.2-RELEASE.xctoolchain/usr/bin" >> "$GITHUB_PATH"
          swift --version

      - name: Ensure release version
        id: prepare
        shell: bash
        run: |
          set -euo pipefail
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          VERSION=$(make version | tr -d '[:space:]')
          TAG_NAME="v${VERSION}"

          if ! grep -q "^## \[$VERSION\]" CHANGELOG.md || git rev-parse -q --verify "refs/tags/$TAG_NAME" >/dev/null; then
            echo "Preparing new patch release (current version: $VERSION)."
            if ! ./scripts/update_changelog.sh --bump patch --date "$(date +%F)"; then
              echo "::error file=scripts/update_changelog.sh::Failed to update changelog." >&2
              exit 1
            fi

            git add CHANGELOG.md Package.swift

            if git diff --cached --quiet; then
              echo "::error::Changelog updater produced no changes. Ensure there are commits since the previous release." >&2
              exit 1
            fi

            NEW_VERSION=$(make version | tr -d '[:space:]')
            git commit -m "chore(release): prepare v${NEW_VERSION}"
            git push origin HEAD
            VERSION="$NEW_VERSION"
            TAG_NAME="v${NEW_VERSION}"
            echo "Bumped to version $VERSION"
          fi

          echo "version=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "clean_version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version ready: $TAG_NAME"

      - name: Build app (make bundle)
        env:
          BUNDLE_VERSION: ${{ steps.prepare.outputs.version }}
          SKIP_CODESIGN: "1"
        run: |
          make clean
          make bundle

      - name: Create DMG
        run: |
          set -euo pipefail
          VER="${{ steps.prepare.outputs.version }}"
          DMG=".build/dist/Launchy-${VER}.dmg"
          hdiutil create -volname "Launchy" -srcfolder ".build/dist/Launchy.app" -ov -format UDZO "$DMG"
          ls -la "$DMG"

      - name: Upload artifact (DMG)
        uses: actions/upload-artifact@v5
        with:
          name: LaunchyDMG
          path: .build/dist/*.dmg
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Download artifact
        uses: actions/download-artifact@v6
        with:
          name: LaunchyDMG
          path: artifact

      - name: Set version and prerelease flag
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          VER='${{ needs.build.outputs.version }}'
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          PRERELEASE=false
          if [[ "$VER" =~ -rc[0-9]+$ ]]; then PRERELEASE=true; fi
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"
          CLEAN_VERSION='${{ needs.build.outputs.clean_version }}'
          echo "clean_version=$CLEAN_VERSION" >> "$GITHUB_OUTPUT"
          echo "Using version: $VER (prerelease=$PRERELEASE)"

      - name: Extract release notes from changelog
        id: notes
        shell: bash
        run: |
          set -euo pipefail
          VERSION='${{ steps.meta.outputs.clean_version }}'
          OUTPUT='release-notes.md'
          awk -v ver="$VERSION" '
            BEGIN {
              target = "^## \\[" ver "\\]"
              in_section = 0
            }
            /^## \[/ {
              if (in_section && $0 !~ target) {
                exit 0
              }
            }
            {
              if ($0 ~ target) {
                in_section = 1
              }
              if (in_section) {
                print
              }
            }
          ' CHANGELOG.md > "$OUTPUT"

          if [[ ! -s "$OUTPUT" ]]; then
            echo "error: changelog entry for version $VERSION not found" >&2
            exit 1
          fi

          echo "body_path=$OUTPUT" >> "$GITHUB_OUTPUT"

      - name: Post release summary
        shell: bash
        run: |
          set -euo pipefail
          VER='${{ steps.meta.outputs.version }}'
          PRERELEASE='${{ steps.meta.outputs.prerelease }}'
          DMG_PATH=$(find artifact -maxdepth 1 -name '*.dmg' | head -n 1)
          DMG_NAME=$(basename "$DMG_PATH")
          DMG_SIZE=$(du -h "$DMG_PATH" | awk '{print $1}')
          CHANNEL_LABEL="Stable"
          if [ "$PRERELEASE" = "true" ]; then CHANNEL_LABEL="Pre-release"; fi
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## 🚀 Launchy Release Snapshot

          | 📦 Artifact | 💾 Size | 🔖 Version | 🧪 Channel |
          | --- | --- | --- | --- |
          | ${DMG_NAME} | ${DMG_SIZE} | ${VER} | ${CHANNEL_LABEL} |

          - ✅ Build completed on **${{ runner.os }}** using the CI Swift toolchain.
          - 📁 Artifact stored at \`artifact/${DMG_NAME}\` and ready for publishing.
          - 🔐 Tag will be created automatically if missing before release publication.

          > Tip: Re-run this workflow after confirming the DMG artifact is still available.
          EOF

      - name: Create tag if missing
        shell: bash
        run: |
          set -euo pipefail
          VER='${{ steps.meta.outputs.version }}'
          if ! git rev-parse -q --verify "refs/tags/$VER" >/dev/null; then
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"
            git tag -a "$VER" -m "$VER"
            git push origin "$VER"
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.version }}
          name: ${{ steps.meta.outputs.version }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          body_path: ${{ steps.notes.outputs.body_path }}
          files: |
            artifact/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
