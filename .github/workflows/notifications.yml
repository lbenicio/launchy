name: CI notification

concurrency:
    group: notification-${{ github.ref }}
    cancel-in-progress: true

on:
    workflow_run:
        workflows:
            - Release
        branches:
            - main
        types:
            - completed
    workflow_dispatch:

jobs:
    notify:
        runs-on: ubuntu-latest
        permissions:
            contents: read
        if: ${{ github.event.workflow_run.name != 'CI notification' }}
        steps:
            - name: Send Telegram message
              uses: appleboy/telegram-action@master
              with:
                  to: ${{ secrets.TELEGRAM_CHAT_ID }}
                  token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
                  format: markdown
                  message: |
                      🚀 **${{ github.event.workflow_run.name }}** ${{ github.event.workflow_run.conclusion == 'success' && '✅ succeeded' || '❌ failed' }}

                      📦 ${{ github.repository }}
                      👤 ${{ github.actor }}

                      [${{ github.event.workflow_run.head_commit.message || 'No commit message' }}](${{ github.event.workflow_run.html_url }})

            - name: Publish workflow summary
              if: always()
              shell: bash
              run: |
                  echo "## Notification – Summary" >> "$GITHUB_STEP_SUMMARY"
                  echo "Workflow: ${{ github.event.workflow_run.name }}" >> "$GITHUB_STEP_SUMMARY"
                  echo "Status: ${{ github.event.workflow_run.conclusion }}" >> "$GITHUB_STEP_SUMMARY"
                  echo "Run: ${{ github.event.workflow_run.html_url }}" >> "$GITHUB_STEP_SUMMARY"
