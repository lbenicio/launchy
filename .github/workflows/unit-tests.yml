name: Unit Tests

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: swift test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Swift toolchain
        uses: swiftlang/setup-swift@v1
        with:
          swift-version: "5.10"

      - name: Run unit tests
        id: run_tests
        continue-on-error: true
        shell: bash
        run: |
          set -uo pipefail
          mkdir -p logs
          LOG_PATH="logs/swift-test.log"
          make test | tee "$LOG_PATH"
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          echo "log_path=$LOG_PATH" >> "$GITHUB_OUTPUT"
          exit $status

      - name: Publish summary
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          STATUS='${{ steps.run_tests.outputs.status }}'
          LOG_PATH='${{ steps.run_tests.outputs.log_path }}'
          if [ -z "$STATUS" ]; then STATUS="unknown"; fi
          if [ "$STATUS" = "0" ]; then
            ICON="✅"
            RESULT="Passed"
          elif [ "$STATUS" = "unknown" ]; then
            ICON="❔"
            RESULT="Unknown"
          else
            ICON="❌"
            RESULT="Failed"
          fi
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          {
            echo "## 🧪 Unit Test Report"
            echo
            echo "| Metric | Value |"
            echo "| --- | --- |"
            echo "| Status | $ICON $RESULT |"
            echo "| Exit Code | $STATUS |"
            echo "| Workflow Run | [#${GITHUB_RUN_NUMBER}]($RUN_URL) |"
            echo "| Commit | $SHORT_SHA |"
            echo "| Branch | ${GITHUB_REF} |"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ -n "$LOG_PATH" ] && [ -f "$LOG_PATH" ]; then
            {
              echo
              echo "### 📄 Test Log Tail"
              echo '```'
              tail -n 20 "$LOG_PATH"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Fail if tests failed
        if: ${{ steps.run_tests.outcome == 'failure' }}
        run: exit 1
