<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Page Not Found &middot; Launchy</title>
  <link rel="icon" type="image/svg+xml" href="./assets/favicon/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />
    <style>
      :root {
        color-scheme: dark light;
        --bg: #0b0d11;
        --fg: #f8fafc;
        --muted: #94a3b8;
        --accent: #38bdf8;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--fg);
        background: radial-gradient(circle at top, rgba(56, 189, 248, 0.18), transparent 55%), var(--bg);
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 48px 24px;
      }
      main {
        max-width: 520px;
        padding: 48px;
        border-radius: 24px;
        background: rgba(15, 23, 42, 0.75);
        backdrop-filter: blur(18px);
        border: 1px solid rgba(148, 163, 184, 0.18);
        box-shadow: 0 30px 60px -35px rgba(15, 23, 42, 0.85);
      }
      h1 {
        font-size: clamp(2.4rem, 5vw, 3rem);
        margin-bottom: 12px;
      }
      p {
        margin: 0 0 32px;
        color: var(--muted);
        line-height: 1.7;
      }
      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-weight: 600;
        padding: 14px 26px;
        border-radius: 999px;
        color: #0f172a;
        background: var(--accent);
        text-decoration: none;
        box-shadow: 0 18px 36px -22px rgba(56, 189, 248, 0.9);
        transition: transform 0.18s ease, box-shadow 0.18s ease;
      }
      a:hover {
        transform: translateY(-2px);
        box-shadow: 0 24px 44px -18px rgba(56, 189, 248, 0.96);
      }
      .code {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 88px;
        height: 88px;
        margin-bottom: 18px;
        border-radius: 22px;
        background: rgba(148, 163, 184, 0.12);
        font-size: 1.5rem;
        font-weight: 600;
        color: var(--accent);
        border: 1px solid rgba(148, 163, 184, 0.18);
      }
    </style>
  </head>
  <body>
    <main>
      <div class="code">404</div>
      <h1>Page not found</h1>
      <p>
        Sorry, we couldn’t find the page you were looking for. It may have been moved or the link could be out of date.
      </p>
      <a href="/">Return to Launchy</a>
    </main>
  </body>
</html>
