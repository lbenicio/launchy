name: Lint and Format

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Swift format and lint checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Swift toolchain
        uses: swiftlang/setup-swift@v1
        with:
          swift-version: "5.10"

      - name: Install SwiftFormat
        shell: bash
        run: |
          set -euo pipefail
          if command -v swiftformat >/dev/null 2>&1; then
            exit 0
          fi
          SWIFTFORMAT_VERSION=0.53.11
          curl -Ls "https://github.com/nicklockwood/SwiftFormat/releases/download/${SWIFTFORMAT_VERSION}/swiftformat_linux.zip" -o swiftformat.zip
          unzip -o swiftformat.zip -d swiftformat_bin
          sudo mv swiftformat_bin/swiftformat /usr/local/bin/swiftformat
          sudo chmod +x /usr/local/bin/swiftformat
          rm -rf swiftformat.zip swiftformat_bin

      - name: Install SwiftLint
        shell: bash
        run: |
          set -euo pipefail
          if command -v swiftlint >/dev/null 2>&1; then
            exit 0
          fi
          sudo apt-get update
          sudo apt-get install -y git libsqlite3-dev libcurl4-openssl-dev libclang-dev
          git clone --depth 1 --branch 0.57.0 https://github.com/realm/SwiftLint.git
          cd SwiftLint
          swift build -c release --product swiftlint
          sudo mv .build/release/swiftlint /usr/local/bin/swiftlint
          sudo chmod +x /usr/local/bin/swiftlint
          cd ..
          rm -rf SwiftLint

      - name: SwiftFormat (lint mode)
        id: swiftformat
        continue-on-error: true
        shell: bash
        run: |
          set -uo pipefail
          mkdir -p logs
          LOG_PATH="logs/swiftformat.log"
          swiftformat --lint src tests | tee "$LOG_PATH"
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          echo "log_path=$LOG_PATH" >> "$GITHUB_OUTPUT"
          exit $status

      - name: SwiftLint (strict)
        id: swiftlint
        continue-on-error: true
        shell: bash
        run: |
          set -uo pipefail
          mkdir -p logs
          LOG_PATH="logs/swiftlint.log"
          swiftlint --strict | tee "$LOG_PATH"
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          echo "log_path=$LOG_PATH" >> "$GITHUB_OUTPUT"
          exit $status

      - name: Publish summary
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          FORMAT_STATUS='${{ steps.swiftformat.outputs.status }}'
          FORMAT_LOG='${{ steps.swiftformat.outputs.log_path }}'
          LINT_STATUS='${{ steps.swiftlint.outputs.status }}'
          LINT_LOG='${{ steps.swiftlint.outputs.log_path }}'

          if [ -z "$FORMAT_STATUS" ]; then FORMAT_STATUS="unknown"; fi
          if [ "$FORMAT_STATUS" = "0" ]; then
            FORMAT_ICON="✅"
            FORMAT_RESULT="Passed"
          elif [ "$FORMAT_STATUS" = "unknown" ]; then
            FORMAT_ICON="❔"
            FORMAT_RESULT="Unknown"
          else
            FORMAT_ICON="❌"
            FORMAT_RESULT="Failed"
          fi

          if [ -z "$LINT_STATUS" ]; then LINT_STATUS="unknown"; fi
          if [ "$LINT_STATUS" = "0" ]; then
            LINT_ICON="✅"
            LINT_RESULT="Passed"
          elif [ "$LINT_STATUS" = "unknown" ]; then
            LINT_ICON="❔"
            LINT_RESULT="Unknown"
          else
            LINT_ICON="❌"
            LINT_RESULT="Failed"
          fi

          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
          {
            echo "## 🧹 Lint & Format Report"
            echo
            echo "| Check | Result | Exit Code |"
            echo "| --- | --- | --- |"
            echo "| SwiftFormat | $FORMAT_ICON $FORMAT_RESULT | $FORMAT_STATUS |"
            echo "| SwiftLint | $LINT_ICON $LINT_RESULT | $LINT_STATUS |"
            echo
            echo "### 🔍 Run Details"
            echo
            echo "| Metric | Value |"
            echo "| --- | --- |"
            echo "| Workflow Run | [#${GITHUB_RUN_NUMBER}]($RUN_URL) |"
            echo "| Commit | $SHORT_SHA |"
            echo "| Branch | ${GITHUB_REF} |"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ -n "$FORMAT_LOG" ] && [ -f "$FORMAT_LOG" ]; then
            {
              echo
              echo "### ✏️ SwiftFormat Log"
              echo '```'
              tail -n 20 "$FORMAT_LOG"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ -n "$LINT_LOG" ] && [ -f "$LINT_LOG" ]; then
            {
              echo
              echo "### 🧭 SwiftLint Log"
              echo '```'
              tail -n 20 "$LINT_LOG"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Fail if checks failed
        if: ${{ steps.swiftformat.outcome == 'failure' || steps.swiftlint.outcome == 'failure' }}
        run: exit 1
