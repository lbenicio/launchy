name: Release

on:
    workflow_dispatch:

permissions:
    contents: write

jobs:
    build-and-release:
        runs-on: macos-latest
        name: Build, bundle, and release
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Install Swift 6.2 toolchain
              shell: bash
              run: |
                  set -euo pipefail
                  SWIFT_URL="https://download.swift.org/swift-6.2-release/xcode/swift-6.2-RELEASE/swift-6.2-RELEASE-osx.pkg"
                  curl -L "$SWIFT_URL" -o /tmp/swift-6.2.pkg
                  sudo installer -pkg /tmp/swift-6.2.pkg -target /
                  TOOLCHAIN_DIR="/Library/Developer/Toolchains/swift-6.2-RELEASE.xctoolchain"
                  echo "$TOOLCHAIN_DIR/usr/bin" >> "$GITHUB_PATH"
                  echo "TOOLCHAINS=swift" >> "$GITHUB_ENV"
                  echo "SWIFT_TOOLCHAIN=$TOOLCHAIN_DIR" >> "$GITHUB_ENV"
                  swift --version

            - name: Read app identity
              run: |
                  set -euo pipefail
                  APP_NAME=$(grep 'let appName' Package.swift | sed 's/.*"\(.*\)".*/\1/')
                  APP_VERSION=$(grep 'let packageVersion' Package.swift | sed 's/.*"\(.*\)".*/\1/')
                  echo "APP_NAME=$APP_NAME" >> "$GITHUB_ENV"
                  echo "APP_VERSION=$APP_VERSION" >> "$GITHUB_ENV"
                  echo "App: $APP_NAME v$APP_VERSION"

            - name: Extract release notes from CHANGELOG.md
              id: notes
              run: |
                  set -euo pipefail
                  v="$APP_VERSION"
                  text=$(awk -v ver="$v" 'BEGIN{found=0} $0 ~ "^## \\[" ver "\\]"{found=1; next} /^## \[/ && found==1{exit} found{printf "%s\n",$0}' CHANGELOG.md)
                  if [[ -z "$text" ]]; then
                    echo "ERROR: no changelog entry found for version $v" >&2
                    exit 1
                  fi
                  printf '%s' "$text" > release_notes.txt
                  echo "release_notes_path=release_notes.txt" >> $GITHUB_OUTPUT

            - name: Check if tag already exists
              run: |
                  set -euo pipefail
                  v="$APP_VERSION"
                  git fetch --tags
                  if git rev-parse "v${v}" >/dev/null 2>&1; then
                    echo "ERROR: tag v${v} already exists" >&2
                    exit 1
                  fi

            - name: Build and bundle
              run: |
                  set -euo pipefail
                  make bundle

            - name: Package for release
              id: package
              run: |
                  set -euo pipefail
                  v="$APP_VERSION"
                  cd .build/dist
                  zip -r "${APP_NAME}-macOS-${v}.zip" "${APP_NAME}.app"
                  echo "package_zip=.build/dist/${APP_NAME}-macOS-${v}.zip" >> $GITHUB_OUTPUT

            - name: Create GitHub release
              id: create_release
              uses: softprops/action-gh-release@v3
              with:
                  tag_name: v${{ env.APP_VERSION }}
                  name: v${{ env.APP_VERSION }}
                  body_path: release_notes.txt
                  draft: false
                  prerelease: false
                  files: .build/dist/${{ env.APP_NAME }}-macOS-${{ env.APP_VERSION }}.zip
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Publish GitHub summary
              if: always()
              shell: bash
              run: |
                  set -euo pipefail
                  echo "## Build & Release – Summary" >> "$GITHUB_STEP_SUMMARY"
                  echo "App: $APP_NAME" >> "$GITHUB_STEP_SUMMARY"
                  echo "Version: v$APP_VERSION" >> "$GITHUB_STEP_SUMMARY"
                  echo "Artifact: $APP_NAME-macOS-$APP_VERSION.zip" >> "$GITHUB_STEP_SUMMARY"
                  echo "Release URL: ${{ steps.create_release.outputs.url }}" >> "$GITHUB_STEP_SUMMARY"
